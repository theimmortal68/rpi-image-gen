---
name: mainsail
mmdebstrap:
  variant: apt
  packages:
    - git
    - nginx
    - unzip
  customize-hooks:
    # Remove default nginx site
    - rm -f "$1/etc/nginx/sites-enabled/default"

    # Copy nginx configurations with directory creation
    - install -Dm 644 "$RPI_TEMPLATES/etc-nginx-sites-available/mainsail" "$1/etc/nginx/sites-available/mainsail"
    - install -Dm 644 "$RPI_TEMPLATES/etc-nginx-conf.d/common_vars.conf" "$1/etc/nginx/conf.d/common_vars.conf"
    - install -Dm 644 "$RPI_TEMPLATES/etc-nginx-conf.d/upstreams.conf" "$1/etc/nginx/conf.d/upstreams.conf"

    # Enable mainsail site by forcefully recreating symlink
    - rm -f "$1/etc/nginx/sites-enabled/mainsail"
    - ln -s "$1/etc/nginx/sites-available/mainsail" "$1/etc/nginx/sites-enabled/mainsail"

    # Modify logrotate cycle from 14d to 2d unconditionally
    - sed -i 's/rotate 14/rotate 2/' "$1/etc/logrotate.d/nginx"

    # Link log files with force overwrite
    - ln -sf "$1/var/log/nginx/mainsail-access.log" "$1/home/${IGconf_device_user1}/printer_data/logs/mainsail-access.log"
    - ln -sf "$1/var/log/nginx/mainsail-error.log" "$1/home/${IGconf_device_user1}/printer_data/logs/mainsail-error.log"

    # Download mainsail zip, always overwrite
    - runuser -u "${IGconf_device_user1}" -- wget -q --show-progress -O "$1/home/${IGconf_device_user1}/mainsail.zip" "${DOWNLOAD_URL}"

    # Unzip mainsail, always overwrite (remove existing dir first)
    - rm -rf "$1/home/${IGconf_device_user1}/mainsail"
    - runuser -u "${IGconf_device_user1}" -- unzip "$1/home/${IGconf_device_user1}/mainsail.zip" -d "$1/home/${IGconf_device_user1}/mainsail"

    # Remove zip after extraction
    - rm -f "$1/home/${IGconf_device_user1}/mainsail.zip"

    # Add user to www-data group (may error if already member)
    - gpasswd -a www-data "${IGconf_device_user1}" || true

    # Ensure execute permission for group on home directory
    - chmod g+x "$1/home/${IGconf_device_user1}"

    # Remove mainsail-config dir and reclone unconditionally
    - rm -rf "$1/home/${IGconf_device_user1}/mainsail-config"
    - runuser -u "${IGconf_device_user1}" -- git clone --depth=1 "${CONFIG_REPO}" "$1/home/${IGconf_device_user1}/mainsail-config"

    # Link mainsail.cfg config file forcibly
    - ln -sf "$1/home/${IGconf_device_user1}/mainsail-config/mainsail.cfg" "$1/home/${IGconf_device_user1}/printer_data/config/mainsail.cfg"

    # Fix ownership for user directories
    - "chown -R ${IGconf_device_user1}:${IGconf_device_user1} $1/home/${IGconf_device_user1}"
env:
  DOWNLOAD_URL: "https://github.com/mainsail-crew/mainsail/releases/latest/download/mainsail.zip"
  CONFIG_REPO: "https://github.com/mainsail-crew/mainsail-config.git"
