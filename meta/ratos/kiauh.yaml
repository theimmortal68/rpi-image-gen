---
name: kiauh
mmdebstrap:
  variant: apt
  packages:
    - git
  customize-hooks:
    # Clone kiauh repository wrapped
    - sh -c "chroot \$1 sh -c 'runuser -u \"${IGconf_device_user1}\" -- git clone --depth=1 https://github.com/dw-o/kiauh \"$1/home/${IGconf_device_user1}/kiauh\"'"

    # Fix ownership for user directories wrapped
    - sh -c "chroot \$1 sh -c 'chown -R pi:pi /home/pi'"
