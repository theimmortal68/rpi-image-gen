---
name: kiauh
mmdebstrap:
  variant: apt
  packages:
    - git
  customize-hooks:
    # Clone KIAUH as the target user inside the chroot
    - |
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        runuser -u "$IGUSER" -- git clone --depth=1 https://github.com/dw-0/kiauh "/home/$IGUSER/kiauh"
      '
