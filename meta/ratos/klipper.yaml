---
name: klipper
mmdebstrap:
  variant: apt
  packages:
    - git
    - virtualenv
    - python3-dev
    - libffi-dev
    - build-essential
    - libncurses-dev
    - pkg-config
    - libusb-dev
    - libusb-1.0-0-dev
    - avrdude
    - gcc-avr
    - binutils-avr
    - avr-libc
    - stm32flash
    - dfu-util
    - libnewlib-arm-none-eabi
    - gcc-arm-none-eabi
    - binutils-arm-none-eabi
    - libusb-1.0-0
    - python3-numpy
    - python3-matplotlib
    - libatlas-base-dev
    - libopenblas-dev
  customize-hooks:
    # All in-chroot work in one block (no resolv.conf/CA, run as user, no chown, no idempotence)
    - |
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/KalicoCrew/kalico.git" \
        BRANCH="bleeding-edge-v2" \
        PRINTER_DATA_DIRS="printer_data printer_data/config printer_data/comms printer_data/logs printer_data/systemd" \
        sh -lc '
          set -eu
          # serial groups
          usermod -a -G tty,dialout "$IGUSER"

          # clone (fails if dir exists — intentional)
          runuser -u "$IGUSER" -- git clone --depth=1 --branch "$BRANCH" "$REPO" "/home/$IGUSER/klipper"

          # printer_data dirs
          for dir in $PRINTER_DATA_DIRS; do
            runuser -u "$IGUSER" -- mkdir -p "/home/$IGUSER/$dir"
          done

          # venv + deps
          ENV_DIR="/home/$IGUSER/klippy-env"
          SRC_DIR="/home/$IGUSER/klipper"
          runuser -u "$IGUSER" -- virtualenv -p python3 "$ENV_DIR"
          runuser -u "$IGUSER" -- bash -lc "\"$ENV_DIR/bin/pip\" install -r \"$SRC_DIR/scripts/klippy-requirements.txt\""
          runuser -u "$IGUSER" -- bash -lc "\"$ENV_DIR/bin/pip\" install numpy"
        '

    # Host-side installs + enable via a tiny helper (pass rootfs as $1 to the script)
    - |
      set -eu
      tmp="$(mktemp -t klipper-host-XXXXXX.sh)"
      cat > "$tmp" <<EOS
      install -Dm 644 "$RPI_TEMPLATES/etc-systemd-system/klipper.service" "\$1/etc/systemd/system/klipper.service"
      install -Dm 644 "$RPI_TEMPLATES/home-printer_data-systemd/klipper.env" "\$1/home/${IGconf_device_user1}/printer_data/systemd/klipper.env"
      "\$BDEBSTRAP_HOOKS/enable-units" "\$1" klipper
      EOS
      sh "$tmp" "$1"
      rm -f "$tmp"
