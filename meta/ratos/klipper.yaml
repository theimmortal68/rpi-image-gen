---
name: klipper
mmdebstrap:
  variant: apt
  packages:
    - git
    - virtualenv
    - python3-dev
    - libffi-dev
    - build-essential
    - libncurses-dev
    - pkg-config
    - libusb-dev
    - libusb-1.0-0-dev
    - avrdude
    - gcc-avr
    - binutils-avr
    - avr-libc
    - stm32flash
    - dfu-util
    - libnewlib-arm-none-eabi
    - gcc-arm-none-eabi
    - binutils-arm-none-eabi
    - libusb-1.0-0
    - python3-numpy
    - python3-matplotlib
    - libatlas-base-dev
    - libopenblas-dev
  customize-hooks:
    # --- In-chroot: add user to serial groups
    - |
      echo "[klipper] usermod add tty,dialout"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        usermod -a -G tty,dialout "$IGUSER"'

    # --- In-chroot: clone source (no fallback, no idempotence)
    - |
      echo "[klipper] clone repo"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/KalicoCrew/kalico.git" \
        BRANCH="bleeding-edge-v2" \
        sh -lc '
          set -eu
          runuser -u "$IGUSER" -- git clone --depth=1 --branch "$BRANCH" "$REPO" "/home/$IGUSER/klipper"'

    # --- In-chroot: create printer_data (fail if exists; no -p) as the user
    - |
      echo "[klipper] mkdir printer_data tree (as user)"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data"
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data/config"
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data/comms"
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data/logs"
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data/gcode"
        runuser -u "$IGUSER" -- mkdir "/home/$IGUSER/printer_data/systemd'
        runuser -u "$IGUSER" -- touch "/home/$IGUSER/printer_data/config/printer.cfg"

    # --- In-chroot: create virtualenv (no idempotence)
    - |
        echo "[klipper] create virtualenv"
        chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
            set -eu
            runuser -u "$IGUSER" -- virtualenv -p python3 "/home/$IGUSER/klippy-env"'

    # --- In-chroot: install Python requirements
    - |
        echo "[klipper] pip install requirements"
        chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
            set -eu
            runuser -u "$IGUSER" -- "/home/$IGUSER/klippy-env/bin/pip" install -r "/home/$IGUSER/klipper/scripts/klippy-requirements.txt"'

    # --- In-chroot: install numpy explicitly
    - |
        echo "[klipper] pip install numpy"
        chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
            set -eu
            runuser -u "$IGUSER" -- "/home/$IGUSER/klippy-env/bin/pip" install numpy'

    # --- Host-side: install systemd unit
    - |
      echo "[klipper] install service unit"
      install -Dm 644 "$RPI_TEMPLATES/etc-systemd-system/klipper.service" "$1/etc/systemd/system/klipper.service"

    # --- Host-side: install env file
    - |
      echo "[klipper] install klipper.env"
      install -Dm 644 "$RPI_TEMPLATES/home-printer_data-systemd/klipper.env" "$1/home/${IGconf_device_user1}/printer_data/systemd/klipper.env"

    # --- Host-side: enable unit
    - |
      echo "[klipper] enable klipper"
      $BDEBSTRAP_HOOKS/enable-units "$1" klipper
