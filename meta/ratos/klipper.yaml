---
name: klipper
mmdebstrap:
  variant: apt
  packages:
    - git
    - virtualenv
    - python3-dev
    - libffi-dev
    - build-essential
    - libncurses-dev
    - pkg-config
    - libusb-dev
    - libusb-1.0-0-dev
    - avrdude
    - gcc-avr
    - binutils-avr
    - avr-libc
    - stm32flash
    - dfu-util
    - libnewlib-arm-none-eabi
    - gcc-arm-none-eabi
    - binutils-arm-none-eabi
    - libusb-1.0-0
    - python3-numpy
    - python3-matplotlib
    - libatlas-base-dev
    - libopenblas-dev
  customize-hooks:
    # --- In-chroot: add user to serial groups
    - |
      echo "[klipper] usermod add tty,dialout"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        usermod -a -G tty,dialout "$IGUSER"
      '

    # --- In-chroot: clone source (no fallback, no idempotence)
    - |
      echo "[klipper] clone repo"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/KalicoCrew/kalico.git" \
        BRANCH="bleeding-edge-v2" \
        sh -lc '
          set -eu
          runuser -u "$IGUSER" -- git clone --depth=1 --branch "$BRANCH" "$REPO" "/home/$IGUSER/klipper"
      '

    # --- In-chroot: create printer_data tree
    - |
      echo "[klipper] mkdir printer_data tree"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        base="/home/$IGUSER/printer_data"
        mkdir "$base"
        mkdir "$base/config"
        mkdir "$base/comms"
        mkdir "$base/logs"
        mkdir "$base/systemd"
        chown -R "$IGUSER:$IGUSER" "/home/$IGUSER"
      '

    # --- In-chroot: create virtualenv
    - |
      echo "[klipper] create virtualenv"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        runuser -u "$IGUSER" -- virtualenv -p python3 "/home/$IGUSER/klippy-env"
      '

    # --- In-chroot: install Klipper Python requirements
    - |
      echo "[klipper] pip install requirements"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        runuser -u "$IGUSER" -- "/home/$IGUSER/klippy-env/bin/pip" install -r "/home/$IGUSER/klipper/scripts/klippy-requirements.txt"
      '

    # --- In-chroot: Input Shaper requirements (moved here from ratos-base)
    - |
      echo "[klipper] Input Shaper requirements"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        IS_REQ_PREINSTALL_VENV_DIR="/home/$IGUSER/klippy-env"
        IS_REQ_PREINSTALL_DEPS="python3-numpy python3-matplotlib libatlas3-base libatlas-base-dev libgfortran5"
        IS_REQ_PREINSTALL_PIP="numpy"

        echo "Installing Input Shaper APT deps (safe if already installed): $IS_REQ_PREINSTALL_DEPS"
        DEBIAN_FRONTEND=noninteractive apt-get update
        # Allow re-install without failing; this is idempotent on Debian
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends $IS_REQ_PREINSTALL_DEPS

        echo "Installing $IS_REQ_PREINSTALL_PIP into venv..."
        runuser -u "$IGUSER" -- "$IS_REQ_PREINSTALL_VENV_DIR/bin/pip" install -v "$IS_REQ_PREINSTALL_PIP"
      '

    # --- Host-side: install systemd unit
    - |
      echo "[klipper] install service unit"
      install -Dm 644 "$RPI_TEMPLATES/etc-systemd-system/klipper.service" "$1/etc/systemd/system/klipper.service"

    # --- Host-side: install env file
    - |
      echo "[klipper] install klipper.env"
      install -Dm 644 "$RPI_TEMPLATES/home-printer_data-systemd/klipper.env" "$1/home/${IGconf_device_user1}/printer_data/systemd/klipper.env"

    # --- Host-side: enable unit
    - |
      echo "[klipper] enable klipper"
      $BDEBSTRAP_HOOKS/enable-units "$1" klipper
