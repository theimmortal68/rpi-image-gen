---
name: ratos-base
mmdebstrap:
  variant: apt
  packages:
    - avahi-daemon
    - bash-completion
    - iptables
    - iproute2
    - python3-pip
    - python3-numpy
    - python3-matplotlib
    - python-is-python3
    - uuid
    - git
    - libatlas3-base
    - libatlas-base-dev
    - libgfortran5
    - unzip
    - nodejs
  customize-hooks:
    # Configure pip to use piwheels for faster ARM package installs
    - "printf 'extra-index-url=https://www.piwheels.org/simple\n' >> \"$1/etc/pip.conf\""

    # Create systemd override directory for autologin
    - "mkdir -p \"$1/etc/systemd/system/getty@tty1.service.d\""

    # Create autologin override file, using %s to safely substitute user
    - |
      printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin %s --noclear %%I \\$TERM\n' "${IGconf_device_user1}" \
      >> "$1/etc/systemd/system/getty@tty1.service.d/autologin.conf"

    # Install headless_nm service files (create parent dirs as needed)
    - "install -Dm 644 \"$RPI_TEMPLATES/boot-firmware/headless_nm.txt.template\" \"$1/boot/firmware/headless_nm.txt.template\""
    - "install -Dm 644 \"$RPI_TEMPLATES/boot-firmware/WiFi-README.txt\" \"$1/boot/firmware/WiFi-README.txt\""
    - "install -Dm 644 \"$RPI_TEMPLATES/etc-systemd-system/headless_nm.service\" \"$1/etc/systemd/system/headless_nm.service\""
    - "install -Dm 755 \"$RPI_TEMPLATES/usr-local-bin/headless_nm\" \"$1/usr/local/bin/headless_nm\""

    # Enable the unit (unambiguous quoting)
    - |
      "$BDEBSTRAP_HOOKS/enable-units" "$1" headless_nm

    # Ensure udev rules dir exists and copy wifi-powersave rules
    - "mkdir -p \"$1/etc/udev/rules.d\""
    - "install -Dm 644 \"$RPI_TEMPLATES/etc-udev-rules.d/070-wifi-powersave.rules\" \"$1/etc/udev/rules.d/070-wifi-powersave.rules\""

    # Fix ownership for user directories
    - chroot "$1" "chown -R ${IGconf_device_user1}:${IGconf_device_user1} $1/home/${IGconf_device_user1}"
