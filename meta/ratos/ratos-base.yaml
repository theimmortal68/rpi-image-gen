---
name: ratos-base
mmdebstrap:
  variant: apt
  packages:
    - avahi-daemon
    - bash-completion
    - iptables
    - iproute2
    - python3-pip
    - python3-numpy
    - python3-matplotlib
    - python-is-python3
    - uuid
    - git
    - libatlas3-base
    - libatlas-base-dev
    - libgfortran5
    - unzip
    - nodejs
  customize-hooks:
    # --- In-chroot: write pip.conf
    - |
      echo "[ratos-base] write /etc/pip.conf"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        printf "%s\n" \
          "[global]" \
          "index-url = https://www.piwheels.org/simple" \
          "extra-index-url = https://pypi.org/simple" \
          > /etc/pip.conf
      '

    # --- In-chroot: create systemd override dir
    - |
      echo "[ratos-base] mkdir getty override dir"
      chroot "$1" sh -lc '
        set -eu
        mkdir -p /etc/systemd/system/getty@tty1.service.d
      '

    # --- In-chroot: write autologin override
    - |
      echo "[ratos-base] write autologin.conf"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        printf "[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin %s --noclear %%I \\$TERM\n" "$IGUSER" \
          > /etc/systemd/system/getty@tty1.service.d/autologin.conf
      '

    # --- Host-side: copy headless_nm template
    - |
      echo "[ratos-base] install headless_nm.txt.template"
      install -Dm 644 "$RPI_TEMPLATES/boot-firmware/headless_nm.txt.template" "$1/boot/firmware/headless_nm.txt.template"

    # --- Host-side: copy WiFi README
    - |
      echo "[ratos-base] install WiFi-README.txt"
      install -Dm 644 "$RPI_TEMPLATES/boot-firmware/WiFi-README.txt" "$1/boot/firmware/WiFi-README.txt"

    # --- Host-side: install service unit
    - |
      echo "[ratos-base] install headless_nm.service"
      install -Dm 644 "$RPI_TEMPLATES/etc-systemd-system/headless_nm.service" "$1/etc/systemd/system/headless_nm.service"

    # --- Host-side: install helper script
    - |
      echo "[ratos-base] install /usr/local/bin/headless_nm"
      install -Dm 755 "$RPI_TEMPLATES/usr-local-bin/headless_nm" "$1/usr/local/bin/headless_nm"

    # --- Host-side: install udev rule
    - |
      echo "[ratos-base] install 070-wifi-powersave.rules"
      install -Dm 644 "$RPI_TEMPLATES/etc-udev-rules.d/070-wifi-powersave.rules" "$1/etc/udev/rules.d/070-wifi-powersave.rules"

    # --- Host-side: enable unit
    - |
      echo "[ratos-base] enable headless_nm"
      "$BDEBSTRAP_HOOKS/enable-units" "$1" headless_nm    # Host-side installs + enable via helper (sanitize env paths, pass rootfs as $1)
    - |
      set -eu
      RT="$(printf '%s' "${RPI_TEMPLATES}"   | tr -d '\r\n')"
      BH="$(printf '%s' "${BDEBSTRAP_HOOKS}" | tr -d '\r\n')"

      tmp="$(mktemp -t ratos-host-XXXXXX.sh)"
      cat > "$tmp" <<EOS
      install -Dm 644 "$RT/boot-firmware/headless_nm.txt.template" "\$1/boot/firmware/headless_nm.txt.template"
      install -Dm 644 "$RT/boot-firmware/WiFi-README.txt"             "\$1/boot/firmware/WiFi-README.txt"
      install -Dm 644 "$RT/etc-systemd-system/headless_nm.service"    "\$1/etc/systemd/system/headless_nm.service"
      install -Dm 755 "$RT/usr-local-bin/headless_nm"                 "\$1/usr/local/bin/headless_nm"
      install -Dm 644 "$RT/etc-udev-rules.d/070-wifi-powersave.rules" "\$1/etc/udev/rules.d/070-wifi-powersave.rules"

      "\$BH/enable-units" "\$1" headless_nm
      EOS
      sh "$tmp" "$1"
      rm -f "$tmp"
