---
name: ratos-base
mmdebstrap:
  variant: apt
  packages:
    - avahi-daemon
    - bash-completion
    - iptables
    - iproute2
    - python3-pip
    - python3-numpy
    - python3-matplotlib
    - python-is-python3
    - uuid
    - git
    - libatlas3-base
    - libatlas-base-dev
    - libgfortran5
    - unzip
    - nodejs
  customize-hooks:
    # Configure pip to use piwheels for faster ARM package installs
    - "printf 'extra-index-url=https://www.piwheels.org/simple\n' >> \"$1/etc/pip.conf\""

    # Create systemd override directory for autologin
    - "mkdir -p \"$1/etc/systemd/system/getty@tty1.service.d\""

    # Create autologin override file, using %s to safely substitute user
    - |
      printf '[Service]\nExecStart=\nExecStart=-/sbin/agetty --autologin %s --noclear %%I \\$TERM\n' "${IGconf_device_user1}" \
      >> "$1/etc/systemd/system/getty@tty1.service.d/autologin.conf"
