---
name: moonraker
mmdebstrap:
  variant: apt
  packages:
    - git
  customize-hooks:
    # In-chroot: add user to groups, clone, install
    - |
      echo "[moonraker] setup"
      chroot "$1" env IGUSER="${IGconf_device_user1}" REPO="https://github.com/Arksine/moonraker" sh -lc '
        set -eu
        # Add to serial groups
        usermod -a -G tty,dialout "$IGUSER"

        # Clone repo (fail if exists — no idempotence)
        runuser -u "$IGUSER" -- git clone --depth=1 "$REPO" "/home/$IGUSER/moonraker"

        # Run installer script
        runuser -u "$IGUSER" -- "/home/$IGUSER/moonraker/scripts/install-moonraker.sh" -s -z'

    # Host-side: copy moonraker.conf
    - |
      echo "[moonraker] install config"
      install -Dm 644 "$RPI_TEMPLATES/home-printer_data-config/moonraker.conf" \
        "$1/home/${IGconf_device_user1}/printer_data/config/moonraker.conf"

    # Host-side: enable moonraker service
    - |
      echo "[moonraker] enable service"
      $BDEBSTRAP_HOOKS/enable-units "$1" moonraker
