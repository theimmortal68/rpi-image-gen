---
name: crowsnest
mmdebstrap:
  variant: apt
  packages:
    - git
    - crudini 
    - bsdutils 
    - findutils 
    - v4l-utils
    - curl
    - build-essential 
    - libevent-dev 
    - libjpeg-dev 
    - libbsd-dev 
    - pkg-config
    - cmake 
    - libavformat-dev 
    - libavutil-dev 
    - libavcodec-dev 
    - libcamera-dev 
    - libcamera-apps-lite
    - liblivemedia-dev  
    - xxd
    - libssl-dev
  customize-hooks:
    # --- In-chroot: clone source (no fallback, no idempotence)
    - |
      echo "[crowsnest] clone repo"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/mainsail-crew/crowsnest.git" \
        sh -lc '
          set -eu
          runuser -u "$IGUSER" -- git clone --depth=1 "$REPO" "/home/$IGUSER/crowsnest"'

    # --- In-chroot: create printer_data (fail if exists; no -p) as the user
    - |
      echo "[crowsnest] install crowsnest"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        cd "/home/$IGUSER/crowsnest"
        export CROWSNEST_UNATTENDED=1
        export CROWSNEST_ADD_CROWSNEST_MOONRAKER=1
        make install'

    # --- Host-side: enable unit
    - |
      echo "[crowsnest] enable crowsnest"
      $BDEBSTRAP_HOOKS/enable-units "$1" crowsnest 
