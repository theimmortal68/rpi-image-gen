---
name: crowsnest
mmdebstrap:
  variant: apt
  packages:
    - git
    - make
    - sudo
    - jq
    - whiptail
    - crudini
    - bsdutils
    - findutils
    - v4l-utils
    - curl
    - build-essential
    - libevent-dev
    - libjpeg-dev
    - libbsd-dev
    - pkg-config
    - cmake
    - libavformat-dev
    - libavutil-dev
    - libavcodec-dev
    - libcamera-dev
    - libcamera-apps-lite
    - rpicam-apps-lite   # <-- fixes the rpicam conflict
    - liblivemedia-dev
    - xxd
    - libssl-dev

  customize-hooks:
    # --- In-chroot: clone source (no fallback, no idempotence)
    - |
      echo "[crowsnest] clone repo"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/mainsail-crew/crowsnest.git" \
        sh -lc '
          set -eu
          runuser -u "$IGUSER" -- git clone --depth=1 "$REPO" "/home/$IGUSER/crowsnest"'

    # --- In-chroot: seed installer config (optional, prevents prompts)
    - |
      echo "[crowsnest] seed tools/.config"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        cd "/home/$IGUSER/crowsnest"
        install -d tools
        cat > tools/.config <<EOF
          CROWSNEST_CONFIG_PATH="/home/$IGUSER/printer_data/config"
          CROWSNEST_LOG_PATH="/home/$IGUSER/printer_data/logs"
          CROWSNEST_ENV_PATH="/home/$IGUSER/printer_data/systemd"
          EOF
        chown -R "$IGUSER:$IGUSER" tools'

    # --- In-chroot: build & install (no systemctl; no sudo)
    - |
      echo "[crowsnest] make install"
      chroot "$1" env DEBIAN_FRONTEND=noninteractive sh -lc '
        set -eu
        cd "/home/'"${IGconf_device_user1}"'/crowsnest"
        make PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1
        SUDO= NO_SYSTEMCTL=1 CROWSNEST_UNATTENDED=1 CROWSNEST_ADD_CROWSNEST_MOONRAKER=1 \
          make install PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1
      '

    # --- Host-side: enable unit
    - |
      echo "[crowsnest] enable crowsnest"
      $BDEBSTRAP_HOOKS/enable-units "$1" crowsnest
