---
name: crowsnest
mmdebstrap:
  variant: apt
  packages:
    - git
    - make
    - sudo
    - jq
    - whiptail
    - crudini
    - bsdutils
    - findutils
    - v4l-utils
    - curl
    - build-essential
    - libevent-dev
    - libjpeg-dev
    - libbsd-dev
    - pkg-config
    - cmake
    - libavformat-dev
    - libavutil-dev
    - libavcodec-dev
    - libcamera-dev
    - libcamera-apps-lite
    - liblivemedia-dev
    - xxd
    - libssl-dev
  customize-hooks:
    # --- In-chroot: clone source (no fallback, no idempotence)
    - |
      echo "[crowsnest] clone repo"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        REPO="https://github.com/mainsail-crew/crowsnest.git" \
        sh -lc '
          set -eu
          runuser -u "$IGUSER" -- git clone --depth=1 "$REPO" "/home/$IGUSER/crowsnest"'

    # --- In-chroot: show what install will do (dry run) to aid debugging
    - |
      echo "[crowsnest] make -n install (dry-run)"
      chroot "$1" sh -lc '
        set -eu
        cd "/home/'"${IGconf_device_user1}"'/crowsnest"
        make -n install PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1 || true'

    # --- In-chroot: build & install as root (noninteractive; avoid systemctl)
    - |
      echo "[crowsnest] make install"
      chroot "$1" env DEBIAN_FRONTEND=noninteractive sh -lc '
        set -eu
        cd "/home/'"${IGconf_device_user1}"'/crowsnest"
        # Build (harmless if no build step)
        make PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1
        # Install into the image; keep it noninteractive and avoid systemctl calls
        NO_SYSTEMCTL=1 CROWSNEST_UNATTENDED=1 CROWSNEST_ADD_CROWSNEST_MOONRAKER=1 \
          make install PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1'

    # --- Host-side: enable service(s) explicitly
    - |
      echo "[crowsnest] enable service"
      $BDEBSTRAP_HOOKS/enable-units "$1" crowsnest
