---
name: crowsnest
mmdebstrap:
  variant: apt
  packages:
    - git
    - crudini
    - bsdutils
    - findutils
    - v4l-utils
    - curl
    - build-essential
    - libevent-dev
    - libjpeg-dev
    - libbsd-dev
    - pkg-config
    - cmake
    - libavformat-dev
    - libavutil-dev
    - libavcodec-dev
    - libcamera-dev
    - libcamera-apps-lite
    - liblivemedia-dev
    - xxd
    - libssl-dev
  customize-hooks:
    # --- In-chroot: clone repo as target user
    - |
      echo "[crowsnest] clone repo"
      chroot "$1" env IGUSER="${IGconf_device_user1}" REPO="https://github.com/mainsail-crew/crowsnest.git" sh -lc '
        set -eu
        runuser -u "$IGUSER" -- git clone --depth=1 "$REPO" "/home/$IGUSER/crowsnest"
      '

    # --- In-chroot: inject a shim that overrides risky steps when flags are set
    - |
      echo "[crowsnest] write injected_chroot_shim.sh"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        cat > "/home/$IGUSER/crowsnest/tools/injected_chroot_shim.sh" <<"SHIM_EOF"
        # Sourced after libs in tools/install.sh; makes installer chroot-friendly.
        : "${CROWSNEST_SKIP_APT_UPDATE:=0}"
        : "${CROWSNEST_SKIP_DEP_INSTALL:=0}"
        : "${CROWSNEST_NO_ENABLE:=0}"
        : "${CROWSNEST_DEBUG:=0}"

        # Optional: rich bash xtrace when CROWSNEST_DEBUG=1
        if [ "$CROWSNEST_DEBUG" = "1" ] ; then
          export PS4='+ ${BASH_SOURCE}:${LINENO}:${FUNCNAME[0]}: '
          # send xtrace to FD 9 if available, else stderr
          if [ -n "${BASH_VERSINFO:-}" ] && [ -w /proc/$$/fd/9 ] 2>/dev/null; then
          export BASH_XTRACEFD=9
          fi
          set -x
        fi

        if [ "$CROWSNEST_SKIP_APT_UPDATE" = "1" ]; then
          run_apt_update() { return 0; }
        fi

        if [ "$CROWSNEST_SKIP_DEP_INSTALL" = "1" ]; then
          shallow_cs_dependencies_check() { return 1; } # choose generic path
          link_pkglist_rpi() { :; }
          link_pkglist_generic() { :; }
          source_pkglist_file() { :; }
          install_dependencies() { return 0; }
        fi

        if [ "$CROWSNEST_NO_ENABLE" = "1" ]; then
          enable_service() { return 0; }
        fi
        SHIM_EOF
        chmod 0644 "/home/$IGUSER/crowsnest/tools/injected_chroot_shim.sh"
      '

    # --- In-chroot: sed-insert a single source line to load the shim (minimal)
    - |
      echo "[crowsnest] patch install.sh to source shim (minimal)"
      chroot "$1" env IGUSER="${IGconf_device_user1}" sh -lc '
        set -eu
        f="/home/$IGUSER/crowsnest/tools/install.sh"
        # Insert right after the last lib source (libs/update_manager.sh)
        sed -i "/libs\/update_manager\.sh\"/a \ \ . \"\${SRC_DIR}\/injected_chroot_shim.sh\"" "$f"
      '

    # --- In-chroot: create log dir for debug output
    - |
      echo "[crowsnest] create log dir"
      chroot "$1" sh -lc '
        set -eu
        install -d -m 0755 /var/log/crowsnest
      '

    # --- In-chroot: lean APT config + warm-up with extra debug (mitigates mem spikes)
    - |
      echo "[crowsnest] prep lean apt config + warm-up (debug)"
      chroot "$1" sh -lc '
        set -eu
        cat >/etc/apt/apt.conf.d/99lean <<EOF
        Acquire::Languages "none";
        Acquire::GzipIndexes "true";
        Acquire::CompressionTypes::Order:: "gz";
        Acquire::PDiffs "false";
        APT::Sandbox::User "root";
        # Debug knobs (safe to leave; just makes logs chatty)
        Debug::pkgProblemResolver "1";
        Debug::Acquire::http "true";
        Acquire::Retries "3";
        EOF
        export DEBIAN_FRONTEND=noninteractive
        rm -rf /var/lib/apt/lists/* || true
        # warm-up update with explicit debug and consistent options
        if ! apt-get \
            -o Acquire::Languages=none \
            -o Acquire::CompressionTypes::Order::=gz \
            -o Acquire::PDiffs=false \
            -o Debug::pkgProblemResolver=1 \
            -o Acquire::Retries=3 \
            update; then
          echo "[crowsnest] apt-get update failed; retrying in 5s..." >&2
          sleep 5
          apt-get \
            -o Acquire::Languages=none \
            -o Acquire::CompressionTypes::Order::=gz \
            -o Acquire::PDiffs=false \
            -o Debug::pkgProblemResolver=1 \
            -o Acquire::Retries=3 \
            update
        fi
      '

    # --- In-chroot: build and run installer with skip flags + FULL DEBUG LOGGING
    - |
      echo "[crowsnest] make install (skip apt/deps, no systemctl, debug log)"
      chroot "$1" env \
        DEBIAN_FRONTEND=noninteractive \
        BASE_USER="${IGconf_device_user1}" \
        CROWSNEST_UNATTENDED=1 \
        CROWSNEST_SKIP_APT_UPDATE=1 \
        CROWSNEST_SKIP_DEP_INSTALL=1 \
        CROWSNEST_NO_ENABLE=1 \
        CROWSNEST_DEBUG=1 \
        NO_SYSTEMCTL=1 \
        sh -lc '
          set -eu
          cd "/home/'"${IGconf_device_user1}"'/crowsnest"

          # Route all stdout/stderr through tee -> /var/log/crowsnest/install.log
          # Also open FD 9 for bash xtrace (BASH_XTRACEFD) so xtrace is readable.
          {
            exec 9>>/var/log/crowsnest/install.log
            export PS4="+ \${BASH_SOURCE}:\${LINENO}:\${FUNCNAME[0]}: "
            export BASH_XTRACEFD=9
            set -x

            echo "=== ENV SNAPSHOT ==="
            env | sort
            echo "=== SHELL ==="
            bash --version 2>/dev/null || true
            echo "=== MAKE (build) ==="
            make PREFIX=/usr SYSCONFDIR=/etc VERBOSE=1

            echo "=== INSTALLER START ==="
            ./tools/install.sh
            echo "=== INSTALLER END ==="
          } 2>&1 | tee -a /var/log/crowsnest/install.log
        '

    # --- Host-side: enable crowsnest service (avoid systemctl inside chroot)
    - |
      echo "[crowsnest] enable service"
      $BDEBSTRAP_HOOKS/enable-units "$1" crowsnest
