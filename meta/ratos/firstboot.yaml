---
name: firstboot-postrename-klipperflash-autoresize
mmdebstrap:
  variant: apt
  packages:
    - bash
    - sed
    - findutils
    - coreutils
    - e2fsprogs
    - cloud-guest-utils   # provides growpart
    - util-linux          # lsblk/findmnt/etc.

  customize-hooks:
    # --- Host-side: install rootfs auto-resize script (first boot)
    - |
      echo "[firstboot] install rootfs-resize-firstboot"
      set -euxo pipefail
      IGUSER="${IGconf_device_user1}"
      install -d -m 0755 "$1/usr/local/sbin" "$1/var/lib/firstboot"

      cat > "$1/usr/local/sbin/rootfs-resize-firstboot" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        STAMP="/var/lib/firstboot/rootfs-resize.done"
        LOGTAG="[rootfs-resize]"

        # Already done?
        [ -f "$STAMP" ] && exit 0

        echo "${LOGTAG} detecting root device..."
        # Find the block device and partition number of the root filesystem
        ROOT_SRC="$(findmnt -no SOURCE /)"
        # Handle typical formats:
        #  - /dev/mmcblk0p2
        #  - /dev/sda2
        #  - /dev/root (Symlink to real dev in some images)
        if [ "$ROOT_SRC" = "/dev/root" ] && [ -e /dev/mmcblk0p2 ]; then
          ROOT_SRC="/dev/mmcblk0p2"
        elif [ "$ROOT_SRC" = "/dev/root" ]; then
          ROOT_SRC="$(readlink -f /dev/root || true)"
        fi

        if [ -z "${ROOT_SRC}" ] || [ ! -e "${ROOT_SRC}" ]; then
          echo "${LOGTAG} could not resolve root device (${ROOT_SRC}); aborting."
          exit 0
        fi

        PARENT_DEV="$(lsblk -no PKNAME "${ROOT_SRC}")"
        PART_NUM="$(lsblk -no PARTNUM "${ROOT_SRC}")"
        if [ -z "${PARENT_DEV}" ] || [ -z "${PART_NUM}" ]; then
          echo "${LOGTAG} unable to determine parent device/partition number; aborting."
          exit 0
        fi
        PARENT_PATH="/dev/${PARENT_DEV}"

        echo "${LOGTAG} growing partition ${PARENT_PATH} #${PART_NUM}..."
        # Grow partition to the end of the device (online)
        growpart "${PARENT_PATH}" "${PART_NUM}" || true

        echo "${LOGTAG} resizing filesystem ${ROOT_SRC}..."
        # Resize ext4 filesystem online
        resize2fs "${ROOT_SRC}" || true

        install -d -m 0755 /var/lib/firstboot
        touch "$STAMP"
        echo "${LOGTAG} complete."
        EOF
      chmod 0755 "$1/usr/local/sbin/rootfs-resize-firstboot"

    # --- Host-side: unit for rootfs auto-resize
    - |
      echo "[firstboot] install rootfs-resize-firstboot.service"
      set -euxo pipefail
      install -d -m 0755 "$1/etc/systemd/system"
      cat > "$1/etc/systemd/system/rootfs-resize-firstboot.service" <<'EOF'
        [Unit]
        Description=Resize root filesystem to fill SD card (first boot)
        DefaultDependencies=no
        After=local-fs.target
        Before=multi-user.target
        ConditionPathExists=!/var/lib/firstboot/rootfs-resize.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/sbin/rootfs-resize-firstboot
        TimeoutStartSec=600

        [Install]
        WantedBy=multi-user.target
        EOF

    # --- Host-side: install post-rename script (runs after resize; writes stamp)
    - |
      echo "[firstboot] install postrename-fix"
      set -euxo pipefail
      IGUSER="${IGconf_device_user1}"

      cat > "$1/usr/local/sbin/postrename-fix" <<'EOF'
        #!/usr/bin/env bash
        # Post Rename Fix Script (first-boot)
        set -Eeuo pipefail
        export LC_ALL=C

        RED="\e[31m"; YEL="\e[33m"; GRE="\e[32m"; WHITE="\e[97m"; NOC="\e[0m"

        SERVICES=(moonraker klipper nginx sonar)
        SYSTEMD_DIR="/etc/systemd/system"
        DEFAULT_USER="__IGUSER__"
        STAMP="/var/lib/firstboot/postrename-fix.done"

        [ -f "$STAMP" ] && exit 0

        # Include KlipperScreen if present
        if find "/home/${DEFAULT_USER}" -name "KlipperScreen" | grep -q .; then
          SERVICES+=(KlipperScreen)
        fi

        stop_services() {
          for srv in "${SERVICES[@]}"; do
            systemctl is-active "${srv}.service" &>/dev/null && systemctl stop "${srv}.service" || true
          done
        }

        start_services() {
          for srv in "${SERVICES[@]}"; do
            systemctl start "${srv}.service" || true
          done
        }

        change_www_root() {
          sed -i "s|/home/pi/mainsail|/home/${DEFAULT_USER}/mainsail|g" \
            /etc/nginx/sites-available/mainsail 2>/dev/null || true
        }

        change_service_user() {
          local servicefile=("${SERVICES[@]/nginx}")
          for i in "${servicefile[@]}"; do
            [ -n "$i" ] && sed -i "s/pi/${DEFAULT_USER}/g" "${SYSTEMD_DIR}/${i}.service" 2>/dev/null || true
          done
        }

        change_env_user() {
          local env_path="/home/${DEFAULT_USER}/printer_data/systemd"
          [ -d "$env_path" ] && find "$env_path" -type f -name "*.env" -exec sed -i "s/pi/${DEFAULT_USER}/g" {} \;
        }

        relocate_venv() {
          local venvs=(klippy-env moonraker-env)
          if printf '%s\0' "${SERVICES[@]}" | grep -Fzxq "KlipperScreen"; then
            venvs+=(".KlipperScreen-env")
          fi
          for venv in "${venvs[@]}"; do
            [ -d "/home/${DEFAULT_USER}/${venv}" ] || continue
            find "/home/${DEFAULT_USER}/${venv}" -name "__pycache__" -type d -exec rm -rf {} + || true
            grep -iRl "pi/${venv}" "/home/${DEFAULT_USER}/${venv}" 2>/dev/null \
              | xargs -r sed -i "s|pi/${venv}|${DEFAULT_USER}/${venv}|g"
          done
        }

        patch_polkit_rules() {
          local polkit_legacy_dir="/etc/polkit-1/localauthority/50-local.d"
          local polkit_dir="/etc/polkit-1/rules.d"
          local polkit_usr_dir="/usr/share/polkit-1/rules.d"
          for file in \
            "${polkit_dir}/moonraker.rules" \
            "${polkit_usr_dir}/moonraker.rules" \
            "${polkit_legacy_dir}/10-moonraker.pkla" \
            "${polkit_dir}/KlipperScreen.rules" \
            "${polkit_usr_dir}/KlipperScreen.rules" \
            "${polkit_legacy_dir}/20-klipperscreen.pkla"
          do
            [ -f "$file" ] && sed -i "s/pi/${DEFAULT_USER}/g" "$file" || true
          done
        }

        fix_broken_links() {
          local brokenlinks=(sonar)
          local path="/usr/local/bin"
          for bl in "${brokenlinks[@]}"; do
            [ -h "${path}/${bl}" ] && rm -f "${path}/${bl}"
            find "/home/${DEFAULT_USER}" -type f -iname "${bl}" -exec ln -sf {} "${path}/${bl}" \; || true
          done
        }

        fix_timelapse_links() {
          local config_dir="/home/${DEFAULT_USER}/printer_data/config"
          local src_dir="/home/${DEFAULT_USER}/moonraker-timelapse"
          local target_dir="/home/${DEFAULT_USER}/moonraker/moonraker/components"
          [ -d "$src_dir" ] && sudo -u "${DEFAULT_USER}" ln -sf "${src_dir}/component/timelapse.py" "${target_dir}/timelapse.py" || true
          [ -d "$src_dir" ] && sudo -u "${DEFAULT_USER}" ln -sf "${src_dir}/klipper_macro/timelapse.cfg" "${config_dir}/timelapse.cfg" || true
        }

        fix_mainsailcfg_links() {
          local config_dir="/home/${DEFAULT_USER}/printer_data/config"
          local src_dir="/home/${DEFAULT_USER}/mainsail-config"
          [ -d "$src_dir" ] && sudo -u "${DEFAULT_USER}" ln -sf "${src_dir}/mainsail.cfg" "${config_dir}/mainsail.cfg" || true
        }

        fix_kiauh_links() {
          local src_dir="/home/${DEFAULT_USER}/kiauh"
          [ -d "$src_dir" ] && ln -sf "${src_dir}/kiauh.sh" "/usr/local/bin/kiauh" || true
        }

        fix_home_permissions() {
          chown -R "${DEFAULT_USER}:${DEFAULT_USER}" "/home/${DEFAULT_USER}" || true
        }

        main() {
          local cmdltxt="/boot/cmdline.txt"

          # Wait until initial resize/firstrun done (safety)
          if grep -q "init" "${cmdltxt}" && grep -q "systemd.run" "${cmdltxt}"; then
            echo -e "[${RED}ERROR${NOC}] ${WHITE}Sdcard resize/firstrun not finished; abort.${NOC}"
            exit 0
          fi

          if [ "${DEFAULT_USER}" = "pi" ]; then
            install -d -m 0755 "$(dirname "$STAMP")"
            touch "$STAMP"
            exit 0
          fi

          stop_services

          change_www_root
          change_service_user
          change_env_user
          relocate_venv
          patch_polkit_rules

          fix_broken_links
          fix_timelapse_links
          fix_mainsailcfg_links
          fix_kiauh_links

          systemctl daemon-reload || true
          start_services

          fix_home_permissions

          install -d -m 0755 "$(dirname "$STAMP")"
          touch "$STAMP"

          # Optional reboot to settle changes; comment out if you want everything in one boot
          reboot
        }

        main
        EOF
      sed -i "s/__IGUSER__/${IGUSER//\//\\/}/g" "$1/usr/local/sbin/postrename-fix"
      chmod 0755 "$1/usr/local/sbin/postrename-fix"

    # --- Host-side: unit for the post-rename script
    - |
      echo "[firstboot] install postrename-fix.service"
      set -euxo pipefail
      cat > "$1/etc/systemd/system/postrename-fix.service" <<'EOF'
        [Unit]
        Description=One-time post-rename patcher (paths, envs, perms)
        After=rootfs-resize-firstboot.service multi-user.target
        Wants=rootfs-resize-firstboot.service
        ConditionPathExists=!/var/lib/firstboot/postrename-fix.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/sbin/postrename-fix
        TimeoutStartSec=600

        [Install]
        WantedBy=multi-user.target
        EOF

    # --- Host-side: install MCU first-boot flasher (runs after postrename-fix)
    - |
    echo "[firstboot] install flash-klipper-mcu-firstboot"
    set -euxo pipefail
      IGUSER="${IGconf_device_user1}"
      cat > "$1/usr/local/sbin/flash-klipper-mcu-firstboot" <<'EOF'
        #!/usr/bin/env bash
        set -euo pipefail

        IGUSER="__IGUSER__"
        BOARD="r${IGUSER}"
        KDIR="/home/${IGUSER}/klipper"
        CFG_SRC="/home/${IGUSER}/printer_data/config/RatOS/boards/${BOARD}/firmware.config"
        STAMP="/var/lib/firstboot/flash-klipper-mcu.done"
        LOGTAG="[flash-klipper-mcu]"

        echo "${LOGTAG} starting..."

        # Already done?
        if [ -f "${STAMP}" ]; then
          echo "${LOGTAG} already flashed; exiting."
          exit 0
        fi

        udevadm settle || true
        sleep 2

        if [ ! -d "${KDIR}" ]; then
          echo "${LOGTAG} ${KDIR} not found; skipping."
          exit 0
        fi
        if [ ! -f "${CFG_SRC}" ]; then
          echo "${LOGTAG} ${CFG_SRC} not found; skipping."
          exit 0
        fi

        # Ensure ownership so user builds don’t trip on perms
        chown -R "${IGUSER}:${IGUSER}" "${KDIR}"

        # Build as the target user
        runuser -u "${IGUSER}" -- bash -lc "
          set -euo pipefail
          cd '${KDIR}'
          cp -f '${CFG_SRC}' .config
          make clean
          make olddefconfig
          make -j\"\$(nproc)\"
        "

        # Flash as root (often needs raw device access)
        cd "${KDIR}"
        make flash

        install -d -m 0755 /var/lib/firstboot
        touch "${STAMP}"
        echo "${LOGTAG} flash complete."
        EOF
      sed -i "s/__IGUSER__/${IGUSER//\//\\/}/g" "$1/usr/local/sbin/flash-klipper-mcu-firstboot"
      chmod 0755 "$1/usr/local/sbin/flash-klipper-mcu-firstboot"

    # --- Host-side: unit for the flasher; runs after postrename-fix and only once
    - |
      echo "[firstboot] install flash-klipper-mcu-firstboot.service"
      set -euxo pipefail
      cat > "$1/etc/systemd/system/flash-klipper-mcu-firstboot.service" <<'EOF'
        [Unit]
        Description=Flash Klipper MCU firmware on first boot
        After=postrename-fix.service
        Wants=postrename-fix.service
        ConditionPathExists=!/var/lib/firstboot/flash-klipper-mcu.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/sbin/flash-klipper-mcu-firstboot
        RemainAfterExit=no
        TimeoutStartSec=600

        [Install]
        WantedBy=multi-user.target
        EOF

    # --- Enable all units without calling systemctl in chroot
    - |
      echo "[firstboot] enable units"
      $BDEBSTRAP_HOOKS/enable-units "$1" rootfs-resize-firstboot postrename-fix flash-klipper-mcu-firstboot
