name: main
mmdebstrap:
  variant: apt
  packages:
    - git
    - npm
    - curl
    - python3-serial
    - python3-opencv
  customize-hooks:
    # --- In-chroot: clone RatOS theme and RatOS configurator, write release, set hostname, variant, MOTD
    - |
      echo "[ratos] setup theme, configurator, release, hostname, variant, motd"
      chroot "$1" env \
        IGUSER="${IGconf_device_user1}" \
        RATOS_THEME_SHIP="https://github.com/Rat-OS/RatOS-theme.git" \
        RATOS_THEME_BRANCH="v2.1.x" \
        RATOS_CONFIGURATOR_SHIP="https://github.com/theimmortal68/RatOS-configurator.git" \
        RATOS_CONFIGURATOR_BRANCH="v2.1.x-backport" \
        DIST_NAME="RatOS" \
        DIST_VERSION="2.1.x" \
        bash -lc '
          set -eu

          # Clone RatOS theme
          runuser -u "$IGUSER" -- git clone --depth=1 --branch "$RATOS_THEME_BRANCH" "$RATOS_THEME_SHIP" \
            "/home/$IGUSER/printer_data/config/.theme"

          # Clone RatOS Configurator
          runuser -u "$IGUSER" -- git clone --depth=1 --branch "$RATOS_CONFIGURATOR_BRANCH" "$RATOS_CONFIGURATOR_SHIP" \
            "/home/$IGUSER/ratos-configurator"

          # Write release file
          echo "$DIST_NAME v$DIST_VERSION ($(grep -E \"^VERSION_CODENAME=\" /etc/os-release | cut -d= -f2))" \
            > "/etc/${DIST_NAME,,}-release"

          # Set hostname to lowercased DIST_NAME and update /etc/hosts
          NEW_HOSTNAME=${DIST_NAME,,}
          if [ -f /etc/hostname ]; then
            ORG_HOSTNAME=$(head -n1 /etc/hostname | tr -d "\r\n")
          else
            ORG_HOSTNAME=raspberrypi
          fi
          echo "$NEW_HOSTNAME" > /etc/hostname
          if [ -f /etc/hosts ]; then
            sed -i -e "s/\\b${ORG_HOSTNAME}\\b/${NEW_HOSTNAME}/g" /etc/hosts
          fi

          # Create variant marker
          echo "${DIST_NAME,,}" > "/etc/${DIST_NAME,,}-variant"
        '

    # --- In-chroot: set Git default for the target user
    - |
      echo "[ratos] set git pull.ff only (user global)"
      chroot "$1" env IGUSER="${IGconf_device_user1}" bash -lc '
        set -eu
        runuser -u "$IGUSER" -- git config --global pull.ff only
      '

    # --- In-chroot: run configurator setup script with hostname fix + sudo/systemctl shims
    - |
      echo "[ratos] run configurator setup (with chroot-safe shims)"
      chroot "$1" env IGUSER="${IGconf_device_user1}" bash -lc '
        set -euo pipefail

        # Ensure hostname resolves for sudo (prevents "unable to resolve host" noise)
        HN="$(cat /etc/hostname 2>/dev/null || echo raspberrypi)"
        if ! grep -qE "^[[:space:]]*127\.0\.1\.1[[:space:]]+$HN(\s|$)" /etc/hosts 2>/dev/null; then
          echo "127.0.1.1 $HN" >> /etc/hosts
        fi

        # Create temporary shims so scripts that call sudo/systemctl won’t fail in a chroot
        SHIMDIR="/tmp/ratos-setup-shims"
        mkdir -p "$SHIMDIR"

        # sudo shim: support 'sudo -u USER cmd' by translating to runuser; otherwise exec directly
        cat > "$SHIMDIR/sudo" <<'EOS'
          #!/bin/sh
          if [ "$1" = "-u" ] && [ -n "$2" ]; then
            U="$2"; shift 2
            exec runuser -u "$U" -- "$@"
          fi
          exec "$@"EOS
        chmod 0755 "$SHIMDIR/sudo"

        # systemctl shim: always succeed (no DBus/systemd in chroot)
        cat > "$SHIMDIR/systemctl" <<'EOS'
          #!/bin/sh
          exit 0
          EOS
        chmod 0755 "$SHIMDIR/systemctl"

        export PATH="$SHIMDIR:$PATH"

        # Run the configurator setup as the target user
        set +e
        runuser -u "$IGUSER" -- bash "/home/$IGUSER/ratos-configurator/app/scripts/setup.sh"
        RC=$?
        set -e

        # Clean shims and return the real status
        rm -rf "$SHIMDIR"
        exit "$RC"
      '

    # --- In-chroot: start configurator in background and wait for readiness
    - |
      echo "[ratos] start configurator and wait for readiness (HTTP 404 on :3000)"
      chroot "$1" env IGUSER="${IGconf_device_user1}" bash -lc '
        set -eu
        cd "/home/$IGUSER/ratos-configurator/app"
        runuser -u "$IGUSER" -- bash -lc "npm run start & echo \$! > /tmp/ratos_configurator.pid"
        timeout 300 bash -lc '\''until [ "$(curl -s -o /dev/null -w "%{http_code}" localhost:3000)" = "404" ]; do sleep 5; done'\'' || true
      '
