---
name: klipper-linear-movement-analysis
mmdebstrap:
  variant: apt
  packages:
    - git
    - python3-pip
  customize-hooks:
    # --- In-chroot: clone Linear Movement Analysis repo as target user
    - |
      echo "[klipper-linear-movement-analysis] clone repo"
      chroot "$1" env \
        BASE_USER="${IGconf_device_user1}" \
        LINEAR_MOVEMENT_ANALYSIS_SHIP="https://github.com/worksasintended/klipper_linear_movement_analysis.git" \
        LINEAR_MOVEMENT_ANALYSIS_BRANCH="main" \
        bash -lc '
          set -eu
          cd "/home/$BASE_USER"
          runuser -u "$BASE_USER" -- git clone --branch "$LINEAR_MOVEMENT_ANALYSIS_BRANCH" \
            --depth=1 "$LINEAR_MOVEMENT_ANALYSIS_SHIP" klipper_linear_movement_analysis
        '

    # --- In-chroot: register extension with RatOS (run as the user)
    - |
      echo "[klipper-linear-movement-analysis] register extension"
      chroot "$1" env BASE_USER="${IGconf_device_user1}" bash -lc '
        set -eu
        EXTENSION_PATH="/home/$BASE_USER/klipper_linear_movement_analysis"
        SCRIPT_NAME="linear_movement_vibrations.py"
        runuser -u "$BASE_USER" -- ratos extensions register klipper "linear_movement_analysis" "${EXTENSION_PATH}/${SCRIPT_NAME}"
      '

    # --- In-chroot: install matplotlib into Klipper venv (as the user)
    - |
      echo "[klipper-linear-movement-analysis] install matplotlib into klippy-env"
      chroot "$1" env BASE_USER="${IGconf_device_user1}" bash -lc '
        set -eu
        runuser -u "$BASE_USER" -- "/home/$BASE_USER/klippy-env/bin/pip" install -v matplotlib
      '

    # --- In-chroot: post-install cleanup (trim pip/user caches)
    - |
      echo "[klipper-linear-movement-analysis] cleanup caches"
      chroot "$1" env BASE_USER="${IGconf_device_user1}" bash -lc '
        set -eu
        # Remove user cache (contains pip wheels, etc.)
        rm -rf "/home/$BASE_USER/.cache" || true
      '
